# NoPhantom 配置文件
# ScriptIrc 配置版本 - 每次修改配置结构时请更新此值
ScriptIrc-config-version: 1

# 全局设置
global-enabled: true  # 是否全局启用幻翼生成限制
send-warning: true    # 是否在阻止幻翼生成时发送警告消息
warning-message: "&c幻翼生成已被阻止！"  # 警告消息（支持颜色代码 &）

# 世界特定设置
# 格式: 世界名: true/false
# true = 允许幻翼生成，false = 禁止幻翼生成
worlds:
  world: false        # 主世界禁止幻翼
  world_nether: true  # 下界允许幻翼
  world_the_end: true # 末地允许幻翼

# 绕过玩家列表
# 这些玩家不受幻翼生成限制影响
bypass-players:
  # - "Notch"
  # - "Herobrine"